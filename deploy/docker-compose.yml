# =====================================================
# QQ 农场智能助手 - 一键部署配置
# =====================================================
# 使用方法:
#   启动：  docker compose up -d
#   停止：  docker compose down
#   日志：  docker compose logs -f
#   更新：  docker compose pull && docker compose up -d
# =====================================================

services:
  # ========== 主应用（Node.js + Vue 前端）==========
  qq-farm-bot:
    image: ${APP_IMAGE:-smdk000/qq-farm-bot-ui:4.5.54}
    container_name: ${STACK_NAME:-qq-farm}-bot
    restart: unless-stopped

    ports:
      - "${WEB_PORT:-3080}:3000"

    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-qq007qq008}
      - TZ=${TZ:-Asia/Shanghai}
      - NODE_ENV=production
      - ROLE=${APP_ROLE:-standalone}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - COOKIE_SECURE=${COOKIE_SECURE:-auto}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - MASTER_URL=${MASTER_URL:-}
      - WORKER_TOKEN=${WORKER_TOKEN:-default_cluster_token}
      - WORKER_NODE_ID=${WORKER_NODE_ID:-}
      - WORKER_HEARTBEAT_INTERVAL_MS=${WORKER_HEARTBEAT_INTERVAL_MS:-15000}
      # 数据库（Docker 内部网络自动解析）
      - MYSQL_HOST=${MYSQL_HOST:-mysql}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-qq_farm_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-qq007qq008}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-qq_farm}
      - MYSQL_POOL_LIMIT=${MYSQL_POOL_LIMIT:-100}
      # Redis
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # 微信协议服务
      - IPAD860_URL=${IPAD860_URL:-http://ipad860:8058}
      - WX_API_KEY=${WX_API_KEY:-}
      - WX_API_URL=${WX_API_URL:-}
      - WX_APP_ID=${WX_APP_ID:-}

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      ipad860:
        condition: service_started

    volumes:
      # 核心数据（账号、SQLite 备份等）
      - bot-data:/app/core/data
      # 日志文件
      - bot-logs:/app/logs

    networks:
      farm-net:
      shared-farm-net:
        aliases:
          - ${STACK_NAME:-qq-farm}-bot

    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ "$${ROLE:-standalone}" = "worker" ]; then
            grep -aq 'client.js' /proc/1/cmdline
          else
            wget --spider -q "http://127.0.0.1:3000/api/ping"
          fi
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # ========== MySQL 8.0 数据库 ==========
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: ${STACK_NAME:-qq-farm}-mysql
    restart: unless-stopped

    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-qq007qq008}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-qq_farm}
      - MYSQL_USER=${MYSQL_USER:-qq_farm_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-qq007qq008}
      - TZ=${TZ:-Asia/Shanghai}

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

    volumes:
      # 数据持久化
      - mysql-data:/var/lib/mysql
      # ⭐ 首次启动自动执行建表脚本（仅数据卷为空时执行）
      - ./init-db:/docker-entrypoint-initdb.d:ro

    networks:
      farm-net:
      shared-farm-net:
        aliases:
          - ${STACK_NAME:-qq-farm}-mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ========== Redis 7 缓存 ==========
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: ${STACK_NAME:-qq-farm}-redis
    restart: unless-stopped

    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}

    entrypoint:
      - /bin/sh
      - -lc

    command:
      - |
        if [ -n "$${REDIS_PASSWORD:-}" ]; then
          exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
        fi
        exec redis-server --appendonly yes

    volumes:
      - redis-data:/data

    networks:
      farm-net:
        aliases:
          - redis
      shared-farm-net:
        aliases:
          - ${STACK_NAME:-qq-farm}-redis

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          memory: 128M

  # ========== Ipad860 微信协议服务（Go）==========
  ipad860:
    image: ${IPAD860_IMAGE:-smdk000/ipad860:latest}
    # 注意：.so 共享库仅有 x86-64 版本
    platform: linux/amd64
    container_name: ${STACK_NAME:-qq-farm}-ipad860
    restart: unless-stopped

    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}

    depends_on:
      - redis

    entrypoint:
      - /bin/sh
      - -lc

    command:
      - |
        set -eu
        REDIS_PASS_ESCAPED=$$(printf '%s' "$${REDIS_PASSWORD:-}" | sed 's/[\\&|]/\\&/g')
        sed -i "s|^redispass = .*|redispass = \"$${REDIS_PASS_ESCAPED}\"|" /app/conf/app.conf
        exec /app/main

    networks:
      farm-net:
      shared-farm-net:
        aliases:
          - ${STACK_NAME:-qq-farm}-ipad860

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

# ========== 网络定义 ==========
networks:
  farm-net:
    driver: bridge
  shared-farm-net:
    name: ${SHARED_DOCKER_NETWORK:-qq-farm-shared}
    external: ${SHARED_DOCKER_NETWORK_EXTERNAL:-false}

# ========== 数据卷定义 ==========
volumes:
  bot-data:
    driver: local
  bot-logs:
    driver: local
  mysql-data:
    driver: local
  redis-data:
    driver: local
