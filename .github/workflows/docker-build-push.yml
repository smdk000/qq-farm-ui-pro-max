name: Docker Multi-Platform Build and Push

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'main'
    paths:
      - 'core/**'
      - 'web/**'
      - 'deploy/**'
      - 'scripts/deploy/**'
      - 'README.md'
      - 'core/Dockerfile'
      - '.github/workflows/docker-build-push.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v3.6.0)'
        required: false
        default: 'v4.5.61'
      push_to_docker_hub:
        description: 'Push to Docker Hub'
        required: false
        default: 'true'
      push_to_ghcr:
        description: 'Push to GitHub Container Registry'
        required: false
        default: 'true'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_USERNAME: smdk000
  DOCKERHUB_IMAGE: smdk000/qq-farm-bot-ui

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check Announcements
        run: node scripts/utils/check-announcements.js

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="main-${GITHUB_SHA::7}"
          fi
          NORMALIZED_VERSION="${VERSION#v}"
          PUSH_NORMALIZED="false"
          if [ "${NORMALIZED_VERSION}" != "${VERSION}" ]; then
            PUSH_NORMALIZED="true"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "normalized_version=${NORMALIZED_VERSION}" >> $GITHUB_OUTPUT
          echo "push_normalized=${PUSH_NORMALIZED}" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "NORMALIZED_VERSION=${NORMALIZED_VERSION}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        if: github.event.inputs.push_to_docker_hub != 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: github.event.inputs.push_to_ghcr != 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.normalized_version }},enable=${{ steps.version.outputs.push_normalized == 'true' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: core/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Update Docker Hub description
        if: github.event.inputs.push_to_docker_hub != 'false'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_IMAGE }}
          readme-filepath: ./README.md
          short-description: 'QQ 农场智能助手 - 多账号挂机 + Web 面板'

      - name: Generate deployment summary
        run: |
          echo "## 🐳 Docker 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**版本**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**构建时间**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 镜像标签" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 仓库 | 镜像名称 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Hub | \`${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.version.outputs.push_normalized }}" = "true" ]; then
            echo "| Docker Hub | \`${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.normalized_version }}\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Docker Hub | \`${{ env.DOCKERHUB_IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Container Registry | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.version.outputs.push_normalized }}" = "true" ]; then
            echo "| GitHub Container Registry | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.normalized_version }}\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| GitHub Container Registry | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 快速部署" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo '# 全新服务器统一入口' >> $GITHUB_STEP_SUMMARY
          echo 'bash <(curl --http1.1 --retry 4 --retry-delay 1 --retry-all-errors --connect-timeout 10 --max-time 90 -fsSL https://raw.githubusercontent.com/smdk000/qq-farm-ui-pro-max/main/scripts/deploy/install-or-update.sh) --action install' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# 已部署服务器统一更新入口' >> $GITHUB_STEP_SUMMARY
          echo '/opt/qq-farm-current/install-or-update.sh --action update --preserve-current' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
