name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: false
        default: 'v4.5.61'
      latest:
        description: 'Latest'
        required: false
        default: 'true'
      prerelease:
        description: 'Prerelease'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Announcements
        run: pnpm check:announcements

      - name: Build Release Assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          bash scripts/release/build-release-assets.sh --version "${VERSION}" --output-dir release-assets

      - name: Render Release Notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node scripts/utils/render-release-notes.js "${VERSION}" > release-body.md

      - name: List Artifacts
        run: ls -R release-assets

      - name: Upload Release Assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: ./release-assets/*

      - name: Upload Release Body
        uses: actions/upload-artifact@v4
        with:
          name: release-body
          path: ./release-body.md

  Release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - uses: actions/download-artifact@v4
        with:
          name: release-body
          path: release-body

      - name: Display structure of downloaded files
        run: |
          ls -R release-assets
          ls -R release-body

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ needs.build.outputs.version || github.event.inputs.version || github.ref_name }}
          tag: ${{ needs.build.outputs.version || github.event.inputs.version || github.ref_name }}
          bodyFile: release-body/release-body.md
          token: ${{ secrets.GITHUB_TOKEN }}
          makeLatest: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.latest || 'true' }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease || 'false' }}
          allowUpdates: true
          artifacts: >
            release-assets/*
