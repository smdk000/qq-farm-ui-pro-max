name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: false
        default: 'v4.5.3'
      latest:
        description: 'Latest'
        required: false
        default: 'true'
      prerelease:
        description: 'Prerelease'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm package:release

      - name: Package Release Assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-assets/qq-farm-deploy

          zip -j "release-assets/qq-farm-bot-${VERSION}-windows-x64.zip" core/dist/qq-farm-bot-win-x64.exe
          tar -C core/dist -czf "release-assets/qq-farm-bot-${VERSION}-linux-x64.tar.gz" qq-farm-bot-linux-x64
          tar -C core/dist -czf "release-assets/qq-farm-bot-${VERSION}-macos-x64.tar.gz" qq-farm-bot-macos-x64
          tar -C core/dist -czf "release-assets/qq-farm-bot-${VERSION}-macos-arm64.tar.gz" qq-farm-bot-macos-arm64

          cp deploy/docker-compose.yml release-assets/qq-farm-deploy/
          cp deploy/.env.example release-assets/qq-farm-deploy/
          cp deploy/README.md release-assets/qq-farm-deploy/
          cp -r deploy/init-db release-assets/qq-farm-deploy/
          cp scripts/deploy/fresh-install.sh release-assets/qq-farm-deploy/
          cp scripts/deploy/update-app.sh release-assets/qq-farm-deploy/
          cp scripts/deploy/quick-deploy.sh release-assets/qq-farm-deploy/

          tar -C release-assets -czf "release-assets/qq-farm-bot-${VERSION}-deploy.tar.gz" qq-farm-deploy
          rm -rf release-assets/qq-farm-deploy

      - name: List Artifacts
        run: ls -R release-assets

      - name: Upload Release Assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: ./release-assets/*

  Release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Display structure of downloaded files
        run: ls -R release-assets

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ needs.build.outputs.version || github.event.inputs.version || github.ref_name }}
          tag: ${{ needs.build.outputs.version || github.event.inputs.version || github.ref_name }}
          body: ${{ needs.build.outputs.version || github.event.inputs.version || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          makeLatest: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.latest || 'true' }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease || 'false' }}
          allowUpdates: true
          artifacts: >
            release-assets/*
